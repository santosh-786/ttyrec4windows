name: Build ttyplay

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Show files
        run: dir

      - name: Build ttyplay
        working-directory: ./ttyplay
        run: |
          go build -o ttyplay.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttyplay-windows
          path: ttyplay/ttyplay.exe
